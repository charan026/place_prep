# Render Blueprint — Backend API
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: placeprep-api
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GEMINI_API_KEY
        sync: false          # you'll set this manually in the Render dashboard
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: DATABASE_URL
        fromDatabase:
          name: placeprep-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false          # set to your Vercel URL after deploying frontend

databases:
  - name: placeprep-db
    plan: free
    databaseName: placement_prep
    region: oregon
